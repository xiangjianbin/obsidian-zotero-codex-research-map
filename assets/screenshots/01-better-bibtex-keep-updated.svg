<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720">
  <rect width="1200" height="720" fill="#f8fafc"/>
  <text x="60" y="70" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#111827">示意截图 1：Better BibTeX 自动导出</text>
  <rect x="60" y="110" width="1080" height="540" rx="18" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="100" y="165" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#1f2937">Zotero - Export Collection</text>
  <rect x="100" y="205" width="470" height="60" rx="8" fill="#eff6ff" stroke="#93c5fd"/>
  <text x="125" y="242" font-family="Arial, sans-serif" font-size="22" fill="#1e3a8a">Format: Better BibTeX</text>
  <rect x="100" y="295" width="28" height="28" fill="#2563eb" rx="4"/>
  <path d="M108 309 L116 318 L128 301" fill="none" stroke="#fff" stroke-width="4"/>
  <text x="145" y="318" font-family="Arial, sans-serif" font-size="22" fill="#111827">Keep updated</text>
  <rect x="100" y="360" width="680" height="58" rx="8" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="125" y="397" font-family="Arial, sans-serif" font-size="20" fill="#334155">&lt;vault&gt;/Zotero/导出文件/research-library.bib</text>
  <rect x="830" y="500" width="220" height="70" rx="10" fill="#16a34a"/>
  <text x="900" y="544" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#fff">OK</text>
  <text x="100" y="600" font-family="Arial, sans-serif" font-size="20" fill="#64748b">关键点：只有勾选 Keep updated，Zotero collection 变动后 .bib 才会自动更新。</text>
</svg>
